<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>neon-canvas // laboratory</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            background: #090a0f;
            color: #f0f2f5;
            font-family: monospace;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        .container {
            text-align: center;
            padding: 2rem;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }
        h1 {
            font-size: 2.5rem;
            margin: 0 0 10px 0;
            color: #00ffcc;
            text-shadow: 0 0 20px rgba(0, 255, 204, 0.4);
            letter-spacing: -1px;
        }
        p {
            color: #8a8f98;
            margin: 0;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>neon-canvas</h1>
        <p>system operational // ready to build</p>
    </div>
</body>
</html>
